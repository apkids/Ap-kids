<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&P Kids | تولید و پخش پوشاک کودک</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 380px;
            padding: 30px;
            text-align: center;
            border: 3px solid #ffcfd2;
        }
        .logo {
            width: 130px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }
        h1 { color: #555; font-size: 22px; margin: 5px 0; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        .info-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            color: #444;
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .info-item i { width: 30px; font-size: 18px; color: #b292ff; }
        .info-item span { font-size: 14px; margin-right: 10px; text-align: right; flex: 1; font-weight: bold; }

        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .socials a { font-size: 30px; transition: 0.3s; }
        .insta { color: #e1306c; }
        .tele { color: #0088cc; }
        .rubika { color: #ffcc00; }

        .address-box {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
            line-height: 1.8;
            background: rgba(255, 230, 230, 0.5);
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            display: block;
            border: 1px dashed #ff8a8a;
            transition: 0.3s;
        }
        .address-box:hover { background: rgba(255, 200, 200, 0.7); }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="A&P Kids" class="logo">
    <h1>A&P Kids</h1>
    <p class="subtitle">تولید و پخش پوشاک کودک</p>

    <div class="info-item">
        <i class="fas fa-store"></i>
        <span>فروشگاه: 02156800325</span>
    </div>

    <a href="tel:09363081827" class="info-item">
        <i class="fas fa-phone"></i>
        <span>علی فیضی: 09363081827</span>
    </a>

    <a href="tel:09385250423" class="info-item">
        <i class="fas fa-phone"></i>
        <span>پوریا بخشی: 09385250423</span>
    </a>

    <div class="socials">
        <a href="https://instagram.com/apkids.style" class="insta"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/apkids" class="tele"><i class="fab fa-telegram"></i></a>
        <a href="https://rubika.ir/apkidss" class="rubika"><i class="fas fa-gem"></i></a>
    </div>

    <a href="https://www.google.com/maps/search/?api=1&query=بازار+بزرگ+تهران+پاساژ+فرد" target="_blank" class="address-box">
        <i class="fas fa-map-marker-alt" style="color: #ff4d4d;"></i><br>
        <b>آدرس:</b> بازار بزرگ تهران، بازارچه سعادت، کوچه عابدین زاده (روبروی ورودی ۳ پارسیان)، پاساژ فرد، زیر همکف، پلاک ۱۱۶
        <br><small style="color: #888;">(برای مشاهده در نقشه کلیک کنید)</small>
    </a>
</div>

</body>
</html>
